name: Docker Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            image: gpt2image-pro-web
            dockerfile: Dockerfile.web
            target: runner
          - name: migrate
            image: gpt2image-pro-migrate
            dockerfile: Dockerfile.web
            target: migrator
          - name: chatgpt-web-proxy
            image: gpt2image-pro-chatgpt-web-proxy
            dockerfile: Dockerfile.chatgpt-web-proxy
            target: runner

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/meowfree/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=http://localhost:3000
            NEXT_PUBLIC_APP_NAME=GPT2IMAGE
            NEXT_PUBLIC_PAYMENT_PROVIDER=none
            NEXT_PUBLIC_GENERATIONS_BUCKET_NAME=generations
            NEXT_PUBLIC_AVATARS_BUCKET_NAME=avatars
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  release:
    runs-on: ubuntu-latest
    needs: docker
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v5

      - name: Prepare compose bundle
        run: |
          mkdir -p dist
          cp docker-compose.yml docker-compose.build.yml .env.docker.example README.md dist/
          tar -czf gpt2image-pro-${GITHUB_REF_NAME}.compose.tar.gz -C dist .
          zip -r gpt2image-pro-${GITHUB_REF_NAME}.compose.zip dist

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            gpt2image-pro-${{ github.ref_name }}.compose.tar.gz
            gpt2image-pro-${{ github.ref_name }}.compose.zip
