# FluxMedia 宿主机 Nginx 主配置。
# 建议安装到 /etc/nginx/nginx.conf，站点配置由 conf.d 目录加载。
user www-data;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 仅接受有限字符的上游追踪 ID，避免日志注入；非法值回退到 Nginx request_id。
    map $http_x_trace_id $trace_id {
        '' $request_id;
        "~^[A-Za-z0-9._:-]{1,128}$" $http_x_trace_id;
        default $request_id;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'trace_id=$trace_id '
                    'request_id=$request_id '
                    'rt=$request_time '
                    'uct=$upstream_connect_time '
                    'uht=$upstream_header_time '
                    'urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 4096;
    server_tokens off;

    # 套餐最大上传量为 75 MB，保留协议与表单编码余量。
    client_max_body_size 100m;
    client_body_timeout 60s;
    client_header_timeout 15s;
    send_timeout 300s;

    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_buffering on;
    proxy_buffers 16 16k;
    proxy_busy_buffers_size 32k;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    include /etc/nginx/conf.d/*.conf;
}
