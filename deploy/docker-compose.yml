# FluxMedia 生产 Compose：运行 Next.js 主服务与只承载缓存的 Redis。
# PostgreSQL 与可选上游均为外部依赖；注册机和 ChatGPT Web 代理不在此编排中。
name: fluxmedia

services:
  # 数据库迁移是一次性维护任务，默认 profile 不启用，普通 up 启动 web 与 Redis。
  migrate:
    profiles:
      - maintenance
    image: ${FLUXMEDIA_MIGRATE_IMAGE:-ghcr.io/fluxcode666/fluxmedia-migrate}:${FLUXMEDIA_TAG:?FLUXMEDIA_TAG 必填}
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL 必填}
      NODE_ENV: production

  # Redis 中可能短暂缓存系统密钥，因此启用密码且禁用持久化，不对宿主机发布端口。
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD 必填}
    command:
      [
        "sh",
        "-c",
        'exec redis-server --save "" --appendonly no --requirepass "$$REDIS_PASSWORD"',
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG',
        ]
      interval: 10s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true

  web:
    image: ${FLUXMEDIA_IMAGE:-ghcr.io/fluxcode666/fluxmedia-web}:${FLUXMEDIA_TAG:?FLUXMEDIA_TAG 必填}
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL 必填}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_DB: ${REDIS_DB:-4}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET 必填}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://media.flux-code.cc}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://media.flux-code.cc}
      LOCAL_STORAGE_PATH: /app/storage
      # 强制禁用注册机，即使服务器旧 .env 中仍残留配置也不会误连。
      CHATGPT_REGISTER_URL: ""
      CHATGPT_REGISTER_SECRET: ""
    ports:
      - "${BIND_HOST:-127.0.0.1}:${WEB_PORT:-3000}:3000"
    volumes:
      - app-storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((response) => process.exit(response.status < 500 ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  app-storage:
